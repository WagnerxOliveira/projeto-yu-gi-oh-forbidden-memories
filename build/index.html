<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Yu-Gi-Oh! Forbidden Memories - Database</title>
  <link rel="stylesheet" href="styles.css">
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
</head>
<body>

  <header class="header">
    <h1 class="header__title">Yu-Gi-Oh! Forbidden Memories</h1>
    <h2 class="header__subtitle">Database Oficial - 722 Cartas</h2>
  </header>

  <div class="search-container">
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="Pesquisar por Nome da Carta ou ID..." autocomplete="off">
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="name">NOME / ID</button>
        <button class="filter-btn" data-filter="atk">ATK</button>
        <button class="filter-btn" data-filter="def">DEF</button>
        <button class="filter-btn" data-filter="cost">COST</button>
        <button class="filter-btn" data-filter="card-type">CARD-TYPE</button>
        <button class="filter-btn" data-filter="type">TYPE</button>
        <button class="filter-btn" data-filter="level">LEVEL</button>
      </div>
    </div>
  </div>

  <main class="cards-grid" id="cardsGrid">
    </main>

  <button id="scrollTopBtn" class="scroll-top-btn" title="Voltar ao topo">&#8679;</button>

  <script src="cards-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
